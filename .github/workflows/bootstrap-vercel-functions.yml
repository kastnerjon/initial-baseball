name: Bootstrap Vercel Functions dependency

on:
  push:
    branches: [agent/post-84-runtime-hardening]

permissions:
  contents: write

jobs:
  dependency:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/post-84-runtime-hardening
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @initial-baseball/web add @vercel/functions
      - run: |
          git add apps/web/package.json pnpm-lock.yaml
          if git diff --cached --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Add Vercel runtime cache dependency"
          git push
