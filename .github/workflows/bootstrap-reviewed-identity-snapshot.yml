name: Bootstrap reviewed identity snapshot

on:
  push:
    branches: [agent/post-84-runtime-hardening]

permissions:
  contents: write

jobs:
  snapshot:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/post-84-runtime-hardening
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm data:identities
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - run: pnpm --filter @initial-baseball/baseball-data update:canonical-identity-snapshot
      - run: |
          git add packages/baseball-data/data/canonical/identity-snapshot
          if git diff --cached --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Add reviewed canonical identity snapshot"
          git push
