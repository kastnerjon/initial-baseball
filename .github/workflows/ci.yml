name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm check:file-sizes
      - name: Generate current baseball data audit
        run: pnpm data:audit
      - name: Upload current baseball data audit
        uses: actions/upload-artifact@v4
        with:
          name: current-baseball-data-audit
          path: |
            packages/baseball-data/reports/current-data-audit.json
            packages/baseball-data/reports/current-data-audit.md
          if-no-files-found: error
      - name: Generate canonical identity candidates
        run: pnpm data:identities
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Upload canonical identity candidates
        uses: actions/upload-artifact@v4
        with:
          name: canonical-baseball-identities
          path: packages/baseball-data/reports/canonical-identities/
          if-no-files-found: error
      - name: Generate Lahman-first canonical universe
        run: pnpm --filter @initial-baseball/baseball-data generate:canonical-universe:strict
      - name: Generate canonical Lahman season facts
        run: pnpm --filter @initial-baseball/baseball-data generate:canonical-season-facts:strict
      - name: Generate canonical player-season aggregates
        run: pnpm --filter @initial-baseball/baseball-data generate:canonical-season-aggregates:strict
      - name: Upload canonical baseball data pipeline
        uses: actions/upload-artifact@v4
        with:
          name: canonical-baseball-data
          path: |
            packages/baseball-data/reports/canonical-universe/
            packages/baseball-data/reports/canonical-season-facts/
            packages/baseball-data/reports/canonical-season-aggregates/
          if-no-files-found: error
      - name: Verify production package build order
        run: |
          pnpm --filter @initial-baseball/shared build
          pnpm --filter @initial-baseball/engine build
          pnpm --filter @initial-baseball/baseball-data build
          pnpm --filter @initial-baseball/daily build
          pnpm --filter @initial-baseball/web build
