name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Run typecheck
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm typecheck 2>&1 | tee typecheck-output.log
      - name: Upload typecheck output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-output
          path: typecheck-output.log
      - name: Fail when typecheck fails
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
      - run: pnpm test
      - run: pnpm check:file-sizes
