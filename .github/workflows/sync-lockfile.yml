name: Sync lockfile

on:
  push:
    branches:
      - agent/extract-daily-puzzle-domain
    paths-ignore:
      - pnpm-lock.yaml

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/extract-daily-puzzle-domain
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --lockfile-only
      - name: Commit lockfile if changed
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo "Lockfile already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore: sync workspace lockfile"
          git push origin HEAD:agent/extract-daily-puzzle-domain
